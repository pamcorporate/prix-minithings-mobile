# Codemagic CI/CD - Prix & MiniThings (Capacitor 8)
# Builds the Android .aab and iOS .ipa in the cloud. No Mac required.
#
# ONE-TIME SETUP in the Codemagic UI (your accounts, done once):
#   1. Add application -> connect this Git repo.
#   2. Integrations -> App Store Connect: add an API key (Issuer ID + Key ID + .p8).
#      Name it "prix_asc_key" (matches `integrations.app_store_connect` below).
#   3. Code signing identities -> Android keystores: upload your upload keystore,
#      reference name "prix_upload" (matches `android_signing` below).
#   4. Environment variables -> group "google_play": add GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
#      (Google Play service-account JSON) for publishing to the internal track.
#
# The native ios/ and android/ folders are generated here each run (npx cap add),
# so they are intentionally NOT in the repo.

workflows:

  android-debug:
    name: Prix & MiniThings - Android (smoke test, unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate native Android project
        script: npx cap add android
      - name: Generate icons and splash from assets/
        script: npm run assets
      - name: Copy web assets into the native project
        script: npx cap sync android
      - name: Build debug APK (no signing needed)
        script: |
          J=$(/usr/libexec/java_home -v 21 2>/dev/null || ls -d /Library/Java/JavaVirtualMachines/*21*/Contents/Home 2>/dev/null | head -1)
          echo "Using JDK 21 at: $J"
          export JAVA_HOME="$J"
          cd android
          ./gradlew assembleDebug -Dorg.gradle.java.home="$J"
    artifacts:
      - android/app/build/outputs/**/*.apk

  android:
    name: Prix & MiniThings - Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        - prix_upload                       # keystore reference from the Codemagic UI
      vars:
        PACKAGE_NAME: "com.pamcorporate.prixminithings"
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate native Android project
        script: npx cap add android
      - name: Generate icons and splash from assets/
        script: npm run assets
      - name: Copy web assets into the native project
        script: npx cap sync android
      - name: Set versionName and versionCode
        script: |
          VN=$(node -p "require('./package.json').version")
          VC=$(( ${PROJECT_BUILD_NUMBER:-0} + 1 ))
          cd android
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VN\"/" app/build.gradle
          sed -i "s/versionCode [0-9][0-9]*/versionCode $VC/" app/build.gradle
      - name: Wire the upload keystore into gradle
        script: |
          printf '\nandroid {\n  signingConfigs { release {\n    storeFile file(System.getenv("CM_KEYSTORE_PATH"))\n    storePassword System.getenv("CM_KEYSTORE_PASSWORD")\n    keyAlias System.getenv("CM_KEY_ALIAS")\n    keyPassword System.getenv("CM_KEY_PASSWORD")\n  } }\n  buildTypes { release { signingConfig signingConfigs.release } }\n}\n' >> android/app/build.gradle
          echo "--- appended signing block ---"; tail -14 android/app/build.gradle
      - name: Build signed release AAB
        script: |
          J=$(/usr/libexec/java_home -v 21 2>/dev/null || ls -d /Library/Java/JavaVirtualMachines/*21*/Contents/Home 2>/dev/null | head -1)
          export JAVA_HOME="$J"
          cd android
          ./gradlew bundleRelease -Dorg.gradle.java.home="$J"
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

  ios:
    name: Prix & MiniThings - iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: prix_asc_key       # API key name from the Codemagic UI
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pamcorporate.prixminithings
      vars:
        BUNDLE_ID: "com.pamcorporate.prixminithings"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate native iOS project
        script: npx cap add ios
      - name: Generate icons and splash from assets/
        script: npm run assets
      - name: Copy web assets into the native project
        script: npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(( ${BUILD_NUMBER:-0} + 1 ))
      - name: Fetch signing profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
